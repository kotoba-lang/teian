name: ci

# deps.edn's :dev alias overrides io.github.kotoba-lang/langchain to a sibling
# local checkout (../langchain); deps.edn also references kotoba-lang/slides
# and kotoba-lang/mailer via :local/root unconditionally ("../slides",
# "../mailer" -- teian holds slides.model EDN verbatim, ADR-2607062000, and
# builds Resend request shapes via mailer.core), and mailer itself needs
# kotoba-lang/mail (../mail). slides also has unconditional west-local UI
# dependencies, so its four direct siblings are checked out here as well.
# langgraph/ed25519/ipns resolve via their pinned :git/sha
# directly (public kotoba-lang repos). Until this standalone repo's Actions
# are enabled, the gates also run in the west superproject:
# `clojure -M:lint` and `clojure -M:dev:test`.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - run: clojure -M:lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: orgs/kotoba-lang/teian }
      - uses: actions/checkout@v4
        with: { repository: kotoba-lang/langchain, path: orgs/kotoba-lang/langchain }
      - uses: actions/checkout@v4
        with: { repository: kotoba-lang/slides, path: orgs/kotoba-lang/slides }
      - uses: actions/checkout@v4
        with: { repository: kotoba-lang/kotoba-ui, path: orgs/kotoba-lang/kotoba-ui }
      - uses: actions/checkout@v4
        with: { repository: kotoba-lang/appkit, path: orgs/kotoba-lang/appkit }
      - uses: actions/checkout@v4
        with: { repository: kotoba-lang/liquid-glass-ui, path: orgs/kotoba-lang/liquid-glass-ui }
      - uses: actions/checkout@v4
        with: { repository: kotoba-lang/shitsuke, path: orgs/kotoba-lang/shitsuke }
      - uses: actions/checkout@v4
        with: { repository: kotoba-lang/mailer, path: orgs/kotoba-lang/mailer }
      - uses: actions/checkout@v4
        with: { repository: kotoba-lang/mail, path: orgs/kotoba-lang/mail }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - name: test (propose-only contract · store parity · CACAO crypto)
        working-directory: orgs/kotoba-lang/teian
        run: clojure -M:dev:test
